# rumdl configuration
# https://github.com/rvben/rumdl

[global]
# Disabled rules
disable = [
  "MD013", # Line length - disabled for prose
  "MD033", # Inline HTML (badges, complex formatting)
  "MD034", # Bare URLs
  "MD036", # Emphasis as pseudo-headings
  "MD044", # Proper names capitalization (too noisy)
  "MD057", # Relative link validation (TODO: re-enable after fixing broken links)
  "MD060", # Table column alignment (too strict for complex tables)
  "MD024", # Duplicate headings — plan docs reuse heading names across skill templates
  "MD076", # Blank lines between list items — plan docs mix file lists with checkbox steps
]

exclude = [
  ".git",
  ".worktrees",
  ".beads",
  ".claude",
  ".serena",
  "dist",
  "node_modules",
  "vendor",
  "site", # MkDocs extended markdown (grid cards, admonitions, icons) — validated by mkdocs build
  "CHANGELOG.md", # Auto-generated by release-please
  "internal/authoring/testdata/golden", # Composer output captures — regenerated via `go test -update`; formatting asserted by composer, not rumdl
]

respect-gitignore = true

# MD024: siblings_only=true is rumdl's default — matches our needs

[MD026]
punctuation = ".,;:!。，；：！"

[MD046]
style = "fenced"

[MD048]
style = "backtick"
