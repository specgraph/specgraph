[project]
site_name = "SpecGraph"
site_url = "https://specgraph.io/"
site_description = "Live Spec-Driven Development Framework"
site_author = "Sean Brandt"
copyright = "© 2026 Sean Brandt • Apache-2.0"

docs_dir = "docs"
site_dir = "build"

nav = [
  "index.md",
  "problem.md",
  "how-it-works.md",
  "quickstart.md",
  { "Concepts" = ["concepts/index.md", "concepts/ground-truth.md", "concepts/spec-graph.md", "concepts/decisions.md", "concepts/authoring.md", "concepts/passes.md", "concepts/slices.md", "concepts/drift.md", "concepts/lifecycle.md", "concepts/linting.md", "concepts/example-spec.md"] },
  { "Guides" = ["guides/index.md", "guides/cli-cookbook.md", "guides/sync.md", "guides/health-probes.md"] },
  "cli-reference.md",
  "architecture.md",
  "ecosystem.md",
  "changelog.md",
]

[project.theme]
variant = "modern"

[project.theme.palette]
scheme = "slate"
primary = "indigo"
accent = "cyan"

[project.theme.features]
navigation.tabs = true
navigation.sections = true
navigation.instant = true
search.suggest = true
content.code.copy = true

[project.repo]
url = "https://github.com/specgraph/specgraph"
name = "GitHub"
