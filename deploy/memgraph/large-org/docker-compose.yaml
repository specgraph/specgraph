# SpecGraph Memgraph — Large Organization
#
# Profile: large-org
# Target:  1,000-4,000+ engineers, 500-2,000+ applications
# Specs:   100,000 - 500,000+ (50-250 per application)
# Decisions: 10,000 - 100,000
# Edges:   500,000 - 2,000,000+
# Memory:  8-16 GB
#
# Sizing estimate (upper bound):
#   ~500K specs * 10 KB avg = 5 GB data
#   + ~100K decisions * 1.5 KB = 150 MB
#   + ~2M edges * 80 bytes = 160 MB
#   + Memgraph overhead (indexes, query engine, WAL) ~500 MB
#   + headroom for deep transitive traversals across 2000+ app graphs
#   = ~6 GB working set, 16 GB limit provides 2.5x headroom
#
# IMPORTANT — at this scale you SHOULD:
#   1. Shard by domain: run separate Memgraph instances per business domain
#      or application portfolio. A single graph with 500K+ nodes and deep
#      cross-application dependency chains will hit memory pressure during
#      transitive queries (GetTransitiveDeps, GetImpact, GetCriticalPath).
#   2. Archive aggressively: superseded and done specs older than N months
#      should be exported and purged from the live graph.
#   3. Add indexes: CREATE INDEX ON :Spec(slug); CREATE INDEX ON :Decision(slug);
#   4. Monitor: use Memgraph Lab (port 7444) and Prometheus metrics.
#   5. Consider Memgraph Enterprise for replication and high availability.
#
# Usage:
#   docker compose -f deploy/memgraph/large-org/docker-compose.yaml up -d
services:
  memgraph:
    image: memgraph/memgraph:latest
    ports:
      - "${MEMGRAPH_PORT:-7687}:7687"
      - "${MEMGRAPH_LAB_PORT:-7444}:7444"
    command:
      - --memory-limit=16384
      - --storage-wal-enabled=true
      - --storage-snapshot-interval-sec=60
      - --storage-snapshot-on-exit=true
      - --storage-recover-on-startup=true
      - --storage-snapshot-retention-count=5
      - --query-execution-timeout-sec=300
      - --log-level=WARNING
    volumes:
      - specgraph-data:/var/lib/memgraph
    deploy:
      resources:
        limits:
          memory: 20g
          cpus: "4"
        reservations:
          memory: 16g
          cpus: "2"
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 10
    restart: unless-stopped
volumes:
  specgraph-data:
