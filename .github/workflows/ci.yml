name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
permissions:
  contents: read
env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: v2.11.1
  YAMLFMT_VERSION: v0.21.0
  ADDLICENSE_VERSION: v1.2.0
  RUMDL_VERSION: 0.1.42
  DPRINT_VERSION: "0.52.0"
jobs:
  build-and-test:
    runs-on: namespace-profile-linux-amd64-4x8
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Cache Go tools
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-${{ env.YAMLFMT_VERSION }}-${{ env.ADDLICENSE_VERSION }}
      - name: Cache dprint
        uses: actions/cache@v5
        with:
          path: ~/.dprint
          key: dprint-${{ runner.os }}-${{ env.DPRINT_VERSION }}
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-rumdl-${{ env.RUMDL_VERSION }}
      - name: Install Go tools
        run: |
          test -f ~/go/bin/golangci-lint || go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
          test -f ~/go/bin/yamlfmt || go install github.com/google/yamlfmt/cmd/yamlfmt@${{ env.YAMLFMT_VERSION }}
          test -f ~/go/bin/addlicense || go install github.com/google/addlicense@${{ env.ADDLICENSE_VERSION }}
      - name: Install rumdl
        run: pip install rumdl==${{ env.RUMDL_VERSION }}
      - name: Install dprint
        run: test -f ~/.dprint/bin/dprint || (curl -fsSL https://dprint.dev/install.sh | sh)
      - name: Add dprint to PATH
        run: echo "$HOME/.dprint/bin" >> "$GITHUB_PATH"
      - name: Quality check
        run: task check
      - name: Verify generated code is up to date
        run: task proto:check
      - name: Integration tests
        run: task test:integration
  e2e:
    needs: build-and-test
    runs-on: namespace-profile-linux-amd64-4x8
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Build
        run: task build
      - name: Run API E2E tests
        run: task test:e2e:api
      - name: Run CLI E2E tests
        run: task test:e2e:cli
  e2e-agent:
    if: >-
      github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || contains(github.event.head_commit.message, '[e2e-agent]')
    needs: build-and-test
    runs-on: namespace-profile-linux-amd64-4x8
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Build
        run: task build
      - name: Run agent E2E tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: task test:e2e:agent
