name: CI
on:
  push:
    branches: [main]
  pull_request:
env:
  GO_VERSION: "1.26"
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Taskfile.yml') }}
      - name: Cache dprint
        uses: actions/cache@v4
        with:
          path: ~/.dprint
          key: dprint-${{ runner.os }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-rumdl
      - name: Install Go tools
        run: |
          test -f ~/go/bin/golangci-lint || go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          test -f ~/go/bin/yamlfmt || go install github.com/google/yamlfmt/cmd/yamlfmt@latest
          test -f ~/go/bin/addlicense || go install github.com/google/addlicense@latest
      - name: Install rumdl
        run: pip install rumdl
      - name: Install dprint
        run: test -f ~/.dprint/bin/dprint || (curl -fsSL https://dprint.dev/install.sh | sh)
      - name: Add dprint to PATH
        run: echo "$HOME/.dprint/bin" >> "$GITHUB_PATH"
      - name: Quality check
        run: task check
      - name: Integration tests
        run: task test:integration
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Build
        run: task build
      - name: Run API E2E tests
        run: task test:e2e:api
