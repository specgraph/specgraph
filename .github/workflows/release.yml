name: Release
on:
  workflow_dispatch: {}
permissions: {}
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  release:
    permissions:
      contents: write
    runs-on: namespace-profile-linux-amd64-4x8
    outputs:
      new_tag: ${{ steps.push.outputs.new_tag || steps.check.outputs.new_tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Generate release app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: Install git-cliff
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        id: cliff
        with:
          args: --bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT: CHANGELOG.md
      - name: Check if version bumped
        id: check
        run: |
          TAG="${{ steps.cliff.outputs.version }}"
          if [ -z "$TAG" ]; then
            echo "No releasable commits since last tag. Exiting."
            echo "new_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${TAG#v}"
          echo "new_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Commit changelog and push
        id: push
        if: steps.check.outputs.new_tag != ''
        run: |
          # Override the remote URL to use the app token for authentication.
          # actions/checkout bakes the default GITHUB_TOKEN into git credentials;
          # we must replace it with the app token to bypass branch protection.
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "specgraph-release-bot[bot]"
          git config user.email "specgraph-release-bot[bot]@users.noreply.github.com"
          git add CHANGELOG.md

          CHANGED=false

          # Commit only if changelog actually changed.
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): ${TAG}"
            git push
            CHANGED=true
          fi

          # Create tag if it doesn't already exist.
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag "${TAG}"
            git push origin "${TAG}"
            CHANGED=true
          fi

          # If nothing changed, this is a no-op re-run. Clear the tag so
          # downstream steps (release creation, goreleaser) are skipped.
          if [ "$CHANGED" = "false" ]; then
            echo "Tag ${TAG} and changelog already exist. Nothing to do."
            echo "new_tag=" >> "$GITHUB_OUTPUT"
          else
            echo "new_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.check.outputs.new_tag }}
      - name: Create GitHub release
        if: steps.push.outputs.new_tag != ''
        run: |
          # Create release if it doesn't already exist (idempotent).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --verify-tag
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.push.outputs.new_tag }}
          NOTES: ${{ steps.cliff.outputs.content }}
  goreleaser:
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: namespace-profile-linux-amd64-4x8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.new_tag }}
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - uses: namespacelabs/nscloud-setup-buildx-action@d059ed7184f0bc7c8b27e8810cea153d02bcc6dd # v0.0.23
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          version: 10
          run_install: false
      - name: Build web UI
        working-directory: web
        run: pnpm install --frozen-lockfile && pnpm build
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Configure Namespace cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1.4.2
        with:
          cache: go
      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "ghcr.io/specgraph/specgraph:${{ needs.release.outputs.version }}"
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-checksums: ./dist/digests.txt
