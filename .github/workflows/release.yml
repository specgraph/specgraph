name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  attestations: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
  goreleaser:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.sha }}
      - name: Create and push git tag
        run: |
          git tag "$TAG" "$SHA"
          git push origin "$TAG"
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
      - uses: sigstore/cosign-installer@v4
      - uses: anchore/sbom-action/download-syft@v0
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Set release version
        id: version
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      - name: Scan Docker image (amd64)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "ghcr.io/specgraph/specgraph:${{ steps.version.outputs.version }}-amd64"
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
      - name: Scan Docker image (arm64)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "ghcr.io/specgraph/specgraph:${{ steps.version.outputs.version }}-arm64"
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/digests.txt
