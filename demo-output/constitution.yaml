name: "specgraph-demo"
layer: "project"
tech:
  languages:
    primary: "go"
    allowed:
      - "go"
      - "typescript"
      - "protobuf"
      - "sql"
    forbidden: []
  frameworks:
    http-server: "connectrpc"
    cli: "cobra"
    frontend: "sveltekit"
    testing: "testify + ginkgo/gomega (e2e)"
  infrastructure:
    database: "postgresql (pgx v5, pgvector)"
    containers: "docker"
    ci: "github-actions"
    build: "taskfile"
  api_standards:
    rpc: "connectrpc/protobuf"
    codegen: "buf"
  data:
    migrations: "goose"
    graph-traversal: "recursive-ctes"
    vector-search: "pgvector"
principles:
  - id: "p-1"
    statement: "Specs are graph nodes, not documents"
    rationale: "Queryable graph enables drift detection, impact analysis, and dependency traversal — static markdown can't do this"
    exceptions: "Exported/rendered views may be markdown, but the source of truth is always the graph"
  - id: "p-2"
    statement: "All multi-query writes use transactions"
    rationale: "ADR-004 — optimistic concurrency with version guards prevents silent data corruption on concurrent edits"
    exceptions: "Read-only queries and single-statement writes don't need transactions"
  - id: "p-3"
    statement: "Proto is the API contract source of truth"
    rationale: "Proto definitions in proto/ generate both Go server code and TypeScript client code — a single schema for all consumers"
    exceptions: "Internal-only edges (HAS_CHANGE, HAS_FINDING) are not in the proto enum"
  - id: "p-4"
    statement: "Domain types in storage, proto types at the boundary"
    rationale: "Storage interfaces use domain types for clean separation — proto types only appear in handlers that convert to/from wire format"
    exceptions: "None"
  - id: "p-5"
    statement: "Content hashes over timestamps for change detection"
    rationale: "Murmur3-128 content hashes on specs and DEPENDS_ON edges give deterministic drift detection without clock skew issues"
    exceptions: "Timestamps still used for display/audit purposes, just not for drift logic"
  - id: "p-6"
    statement: "CLI is a thin client — no domain or functional logic"
    rationale: "All business logic lives in the server. The CLI formats requests, calls RPCs, and renders responses. This ensures every client (CLI, UI, agents) gets identical behavior"
    exceptions: "Pure presentation logic (table formatting, color output) lives in the CLI"
  - id: "p-7"
    statement: "Human-first and agent-first are not in tension"
    rationale: "The system serves both human developers and AI agents. APIs must be readable and discoverable for humans while being structured and predictable for programmatic use. JSON output flags, clear error codes, and self-describing responses serve both"
    exceptions: "None"
constraints:
  - "Generated code in gen/ must never be hand-edited — modify proto/ sources and run task proto"
  - "All .go, .sh, .py, .proto files require SPDX license headers"
  - "Handler error messages must not leak internal details — use error codes for test assertions, not message strings"
  - "DEPENDS_ON edges must carry content_hash_at_link — no unbaselined dependencies"
  - "RunInTransaction required for all multi-query write paths (ADR-004)"
  - "Mock backends must return sentinel errors (e.g. storage.ErrSpecNotFound), not fmt.Errorf()"
  - "task check must pass before any push; task pr-prep before any PR creation or push to an existing PR"
antipatterns:
  - pattern: "Business logic in the CLI layer"
    why: "Creates behavior divergence between clients (CLI, UI, agents) and makes the server's API an incomplete representation of the system"
    instead: "Put logic in internal/server/ or internal/authoring/; CLI only calls RPCs and renders output"
  - pattern: "Per-test database containers"
    why: "280s vs 8s test suite — shared container with clearDatabase(t) between tests is the established pattern"
    instead: "Use TestMain shared container in *_test.go with clearDatabase(t) wipes"
  - pattern: "Timestamp-based drift detection"
    why: "Clock skew across machines gives false positives/negatives"
    instead: "Compare content_hash_at_link on edges against upstream's current ContentHash"
  - pattern: "Testing error message strings from handlers"
    why: "Handler error messages are sanitized and may change — tests coupled to strings are brittle"
    instead: "Assert on connect error codes (connect.CodeNotFound, connect.CodeAborted, etc.)"
process:
  spec_review: "All specs pass through the authoring funnel (Spark → Shape → Specify → Decompose → Approve) before implementation"
  security_review:
    when: "Specs touching auth, storage access patterns, or external integrations"
  deployment:
    strategy: "Docker container"
    rollback: "Redeploy previous image"
  documentation:
    api_docs: "Proto definitions are the API docs — comments in .proto files"
    runbook: "None required yet"
references:
  - type: "doc"
    path: "CLAUDE.md"
  - type: "doc"
    path: "proto/specgraph/v1/"
  - type: "adr"
    path: "docs/decisions/ADR-001-principle-statement-field-naming.md"
  - type: "adr"
    path: "docs/decisions/ADR-002-stable-ulid-ids-content-hash.md"
  - type: "adr"
    path: "docs/decisions/ADR-004-optimistic-concurrency-transactions.md"
  - type: "adr"
    path: "docs/decisions/ADR-005-no-native-windows-support.md"
  - type: "doc"
    path: "docs/initial-design-session/specgraph-v1.0-draft-spec.md"
  - type: "doc"
    path: "docs/initial-design-session/specgraph-v1.0-draft-roadmap.md"
  - type: "doc"
    path: "docs/initial-design-session/specgraph-v1.0-draft-adr-001-storage.md"
  - type: "doc"
    path: "docs/initial-design-session/specgraph-v1.0-draft-adr-002-gastown.md"
  - type: "doc"
    path: "docs/initial-design-session/specgraph-v1.0-draft-adr-003-decisions.md"
  - type: "doc"
    path: "docs/designs/template-system-design.md"
  - type: "doc"
    path: "docs/designs/2026-03-26-confluence-to-specgraph-design-bridge.md"
