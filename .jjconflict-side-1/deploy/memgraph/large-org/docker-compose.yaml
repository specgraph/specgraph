# SpecGraph Memgraph — Large Organization
#
# Profile: large-org
# Target:  1,000-4,000+ engineers, 500-2,000+ applications
# Specs:   50,000 - 500,000+
# Memory:  8-16 GB
#
# See deploy/memgraph/README.md for sizing formula, operational guidance,
# and sharding recommendations at this scale.
#
# SECURITY: This config has NO authentication or TLS enabled. For production
# deployments at this scale you MUST configure Memgraph authentication,
# TLS on bolt, and network isolation. Memgraph Lab (port 7444) provides
# full graph access with no login. See Memgraph docs for details.
#
# Usage:
#   docker compose -f deploy/memgraph/large-org/docker-compose.yaml up -d
services:
  memgraph:
    image: memgraph/memgraph-platform:2.4.0
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    ports:
      - "${MEMGRAPH_PORT:-7687}:7687"
      - "${MEMGRAPH_LAB_PORT:-7444}:7444"
    environment:
      - MEMGRAPH=--memory-limit=16384 --storage-wal-enabled=true --storage-snapshot-interval-sec=60 --storage-snapshot-on-exit=true --storage-recover-on-startup=true --storage-snapshot-retention-count=5 --query-execution-timeout-sec=300 --log-level=WARNING
    volumes:
      - specgraph-data:/var/lib/memgraph
    deploy:
      resources:
        limits:
          memory: 20g
          cpus: "4"
        reservations:
          memory: 16g
          cpus: "2"
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 10
    restart: unless-stopped
volumes:
  specgraph-data:
