# E2E test stack: Postgres + SpecGraph server + Playwright
# All containers share a Docker network. No host ports needed.
services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      - POSTGRES_USER=specgraph
      - POSTGRES_PASSWORD=specgraph
      - POSTGRES_DB=specgraph
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specgraph -d specgraph"]
      interval: 3s
      timeout: 10s
      retries: 10
  specgraph:
    build:
      context: ../..
      dockerfile: Dockerfile.e2e
      secrets:
        - extra-certs
    command: ["serve"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - XDG_CONFIG_HOME=/etc
    volumes:
      - ./config.e2e.yaml:/etc/specgraph/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- --post-data='{}' --header='Content-Type: application/json' --header='Connect-Protocol-Version: 1' http://localhost:9090/specgraph.v1.ServerService/Health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
  seeder:
    image: pgvector/pgvector:pg18
    depends_on:
      specgraph:
        condition: service_healthy
    volumes:
      - ./seed.sql:/seed.sql:ro
    command: >
      psql "postgres://specgraph:specgraph@postgres:5432/specgraph?sslmode=disable" -v ON_ERROR_STOP=1 -f /seed.sql

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
      secrets:
        - extra-certs
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      - SPECGRAPH_BASE_URL=http://specgraph:9090
    volumes:
      - ./test-results:/tests/test-results
secrets:
  extra-certs:
    file: ${EXTRA_CA_BUNDLE:-/dev/null}
