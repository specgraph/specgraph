# https://taskfile.dev
version: "3"
vars:
  BINARY_NAME: specgraph
  MAIN_PKG: ./cmd/specgraph
tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
  # Development
  dev:
    desc: Run specgraph in development mode
    deps: [generate]
    cmds:
      - go run {{.MAIN_PKG}}
  # Code Generation
  generate:
    desc: Generate all code (protobuf)
    deps: [proto]
  proto:
    desc: Generate Go code from protobuf definitions
    sources:
      - proto/**/*.proto
      - buf.yaml
      - buf.gen.yaml
    generates:
      - gen/**/*.go
    cmds:
      - buf generate
  # Building
  build:
    desc: Build the specgraph binary
    deps: [generate]
    cmds:
      - go build -o {{.BINARY_NAME}} {{.MAIN_PKG}}
  build:all:
    desc: Build for all platforms
    deps: [generate]
    cmds:
      - task: build:linux
      - task: build:darwin
  build:linux:
    desc: Build for Linux
    cmds:
      - GOOS=linux GOARCH=amd64 go build -o dist/{{.BINARY_NAME}}-linux-amd64 {{.MAIN_PKG}}
      - GOOS=linux GOARCH=arm64 go build -o dist/{{.BINARY_NAME}}-linux-arm64 {{.MAIN_PKG}}
  build:darwin:
    desc: Build for macOS
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -o dist/{{.BINARY_NAME}}-darwin-amd64 {{.MAIN_PKG}}
      - GOOS=darwin GOARCH=arm64 go build -o dist/{{.BINARY_NAME}}-darwin-arm64 {{.MAIN_PKG}}
  # Testing
  test:
    desc: Run all tests
    cmds:
      - go test -race -v ./...
  test:coverage:
    desc: Run tests with coverage
    cmds:
      - go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -html=coverage.out -o coverage.html
  test:short:
    desc: Run short tests only
    cmds:
      - go test -short -v ./...
  test:e2e:
    desc: Run all E2E tests (requires Docker)
    cmds:
      - task: test:e2e:api
      - task: test:e2e:docker
  test:e2e:api:
    desc: Run API E2E tests (requires Docker for Memgraph)
    cmds:
      - go test -tags e2e -v -timeout 5m ./e2e/api/...
  test:e2e:docker:
    desc: Run Docker mode E2E tests (requires Docker)
    deps: [build]
    cmds:
      - go test -tags e2e -v -timeout 5m ./e2e/docker/...
  # Linting
  lint:
    desc: Run all linters
    cmds:
      - task: lint:go
      - task: lint:markdown
      - task: lint:yaml
  lint:go:
    desc: Lint Go code
    cmds:
      - golangci-lint run
  lint:markdown:
    desc: Lint Markdown files
    cmds:
      - rumdl check .
  lint:yaml:
    desc: Lint YAML files
    cmds:
      - yamlfmt -lint .
  # License headers
  license:check:
    desc: Check SPDX license headers
    cmds:
      - |
        set -euo pipefail
        DIRS="cmd internal proto e2e"
        EXISTING_DIRS=""
        for dir in $DIRS; do
          [[ -d "$dir" ]] && EXISTING_DIRS="$EXISTING_DIRS $dir"
        done
        command -v addlicense >/dev/null 2>&1 || go install github.com/google/addlicense@latest
        addlicense -check -f LICENSE_HEADER -ignore '**/*.pb.go' -ignore 'vendor/**' $EXISTING_DIRS
  license:add:
    desc: Add missing SPDX license headers
    cmds:
      - |
        set -euo pipefail
        DIRS="cmd internal proto e2e"
        EXISTING_DIRS=""
        for dir in $DIRS; do
          [[ -d "$dir" ]] && EXISTING_DIRS="$EXISTING_DIRS $dir"
        done
        command -v addlicense >/dev/null 2>&1 || go install github.com/google/addlicense@latest
        addlicense -f LICENSE_HEADER -ignore '**/*.pb.go' -ignore 'vendor/**' $EXISTING_DIRS
  # Formatting
  fmt:
    desc: Format all files
    cmds:
      - task: fmt:go
      - task: fmt:yaml
      - task: fmt:markdown
      - task: fmt:dprint
  fmt:go:
    desc: Format Go code
    cmds:
      - gofumpt -w .
  fmt:yaml:
    desc: Format YAML files
    cmds:
      - yamlfmt .
  fmt:markdown:
    desc: Format Markdown files
    cmds:
      - rumdl fmt .
  fmt:dprint:
    desc: Format with dprint
    cmds:
      - dprint fmt
  fmt:check:
    desc: Check formatting without modifying
    cmds:
      - dprint check
  # Dependencies
  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy
  deps:upgrade:
    desc: Upgrade all dependencies
    cmds:
      - go get -u ./...
      - go mod tidy
  # Documentation
  docs:setup:
    desc: Set up documentation development environment
    dir: site
    cmds:
      - uv sync
  docs:build:
    desc: Build documentation site
    dir: site
    cmds:
      - uv run zensical build
  docs:serve:
    desc: Start documentation dev server
    dir: site
    cmds:
      - uv run zensical serve
  # Git hooks
  hooks:install:
    desc: Install git hooks
    cmds:
      - lefthook install
      - bd hooks install --chain
  hooks:uninstall:
    desc: Uninstall git hooks
    cmds:
      - bd hooks uninstall
      - lefthook uninstall
  # Tools
  tools:
    desc: Install development tools
    cmds:
      - brew install golangci-lint gofumpt lefthook actionlint goreleaser dprint cocogitto rumdl yamlfmt buf
      - brew install steveyegge/beads/bd
      - echo "Tools installed. Run 'task hooks:install' to set up git hooks."
  # Cleanup
  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist/
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html
      - rm -rf gen/
  # Release
  release:check:
    desc: Validate goreleaser config
    cmds:
      - goreleaser check
  release:snapshot:
    desc: Build snapshot locally (no publish, local arch only)
    cmds:
      - goreleaser build --snapshot --clean --single-target
