syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

import "google/protobuf/timestamp.proto";

// --- Enums ---

// ConstitutionLayer defines the scope at which a constitution applies.
// More specific layers override general ones: User → Org → Project → Domain
// (Domain is most specific and takes precedence).
enum ConstitutionLayer {
  CONSTITUTION_LAYER_UNSPECIFIED = 0;
  CONSTITUTION_LAYER_USER = 1;
  CONSTITUTION_LAYER_ORG = 2;
  CONSTITUTION_LAYER_PROJECT = 3;
  CONSTITUTION_LAYER_DOMAIN = 4;
}

// OutputFormat specifies the tool-file format for constitution emission.
enum OutputFormat {
  OUTPUT_FORMAT_UNSPECIFIED = 0;
  OUTPUT_FORMAT_CLAUDE_MD = 1;
  OUTPUT_FORMAT_CURSORRULES = 2;
  OUTPUT_FORMAT_AGENTS_MD = 3;
}

// ReferenceType classifies the kind of document a constitution reference points to.
enum ReferenceType {
  REFERENCE_TYPE_UNSPECIFIED = 0;
  REFERENCE_TYPE_ADR = 1;
  REFERENCE_TYPE_SPEC = 2;
  REFERENCE_TYPE_DOC = 3;
  REFERENCE_TYPE_URL = 4;
}

// --- Messages ---

// Constitution is the project ground truth — layered rules, tech stack,
// principles, constraints, and anti-patterns that govern a codebase.
message Constitution {
  // Unique identifier, generated on first create.
  string id = 1;
  // Scope at which this constitution applies.
  ConstitutionLayer layer = 2;
  // Human-readable name for this constitution.
  string name = 3;
  // Monotonically increasing version, bumped on each update.
  int32 version = 4;
  // Technology stack configuration.
  TechConfig tech = 5;
  // Guiding principles for the project.
  repeated Principle principles = 6;
  // Process configuration (review, deployment, docs).
  ProcessConfig process = 7;
  // Hard constraints that must not be violated.
  repeated string constraints = 8;
  // Known anti-patterns to avoid.
  repeated Antipattern antipatterns = 9;
  // External references (ADRs, specs, docs).
  repeated Reference references = 10;
  // Timestamp of initial creation.
  google.protobuf.Timestamp created_at = 11;
  // Timestamp of most recent update.
  google.protobuf.Timestamp updated_at = 12;
  // URL where this layer was imported from (empty for local imports).
  string source_url = 13;
  // Content hash of the source at import time (for drift detection).
  string source_hash = 14;
}

// TechConfig describes the technology stack for a project.
message TechConfig {
  // Programming language configuration.
  LanguageConfig languages = 1;
  // Framework choices keyed by area (e.g. "api" -> "ConnectRPC").
  map<string, string> frameworks = 2;
  // Infrastructure choices keyed by area (e.g. "runtime" -> "Docker").
  map<string, string> infrastructure = 3;
  // API standard choices keyed by area.
  map<string, string> api_standards = 4;
  // Data store choices keyed by area.
  map<string, string> data = 5;
}

// LanguageConfig specifies which programming languages are permitted.
message LanguageConfig {
  // The primary language for the project.
  string primary = 1;
  // Languages explicitly allowed.
  repeated string allowed = 2;
  // Languages explicitly forbidden.
  repeated string forbidden = 3;
  // Reasons why each forbidden language is banned, keyed by language name.
  map<string, string> forbidden_reasons = 4;
}

// Principle captures a guiding design or engineering principle.
message Principle {
  // Stable identifier for cross-referencing (e.g. "p1").
  string id = 1;
  // The principle statement itself.
  string statement = 2;
  // Why this principle matters.
  string rationale = 3;
  // When this principle may be relaxed.
  string exceptions = 4;
}

// ProcessConfig describes the team's review and deployment processes.
message ProcessConfig {
  // When/how spec reviews are conducted.
  string spec_review = 1;
  // Security review configuration.
  SecurityReviewConfig security_review = 2;
  // Deployment strategy configuration.
  DeploymentConfig deployment = 3;
  // Documentation requirements.
  DocumentationConfig documentation = 4;
}

// SecurityReviewConfig describes when security reviews are required.
message SecurityReviewConfig {
  // Trigger condition (e.g. "auth changes", "data model changes").
  string when = 1;
}

// DeploymentConfig describes the deployment strategy.
message DeploymentConfig {
  // Deployment strategy (e.g. "blue-green", "canary").
  string strategy = 1;
  // Rollback policy.
  string rollback = 2;
}

// DocumentationConfig describes documentation requirements.
message DocumentationConfig {
  // API documentation requirements.
  string api_docs = 1;
  // Runbook requirements.
  string runbook = 2;
}

// Antipattern describes a known bad practice to avoid.
message Antipattern {
  // The pattern to avoid (e.g. "god object").
  string pattern = 1;
  // Why this pattern is harmful.
  string why = 2;
  // What to do instead.
  string instead = 3;
}

// Reference points to an external document related to the constitution.
message Reference {
  // The kind of reference.
  ReferenceType reference_type = 1;
  // Path or URL to the referenced document.
  string path = 2;
}

// --- Requests/Responses ---

// GetConstitutionRequest requests the active constitution.
// If layer is UNSPECIFIED, returns the merged result across all layers.
message GetConstitutionRequest {
  ConstitutionLayer layer = 1;
}

// ProvenanceEntry tracks which layer contributed a specific field or item.
message ProvenanceEntry {
  string path = 1;
  ConstitutionLayer layer = 2;
}

// GetConstitutionResponse wraps the active constitution.
message GetConstitutionResponse {
  Constitution constitution = 1;
  // Provenance entries indicating which layer each value came from.
  // Only populated when returning a merged result (no layer filter).
  repeated ProvenanceEntry provenance = 2;
}

// UpdateConstitutionRequest provides a new or updated constitution.
message UpdateConstitutionRequest {
  Constitution constitution = 1;
}

// UpdateConstitutionResponse wraps the stored constitution after update.
message UpdateConstitutionResponse {
  Constitution constitution = 1;
}

// EmitToolFilesRequest specifies which tool-file format to generate.
message EmitToolFilesRequest {
  // The output format to generate.
  OutputFormat format = 1;
}

// EmitToolFilesResponse contains the generated file content and suggested filename.
message EmitToolFilesResponse {
  // The generated file content.
  string content = 1;
  // Suggested filename (e.g. "CLAUDE.md").
  string filename = 2;
}

// --- Service ---

// ConstitutionService manages the project constitution and related operations.
service ConstitutionService {
  // GetConstitution returns the active constitution.
  rpc GetConstitution(GetConstitutionRequest) returns (GetConstitutionResponse);
  // UpdateConstitution creates or replaces the constitution, bumping its version.
  rpc UpdateConstitution(UpdateConstitutionRequest) returns (UpdateConstitutionResponse);
  // EmitToolFiles generates a tool-specific configuration file from the constitution.
  rpc EmitToolFiles(EmitToolFilesRequest) returns (EmitToolFilesResponse);
}
