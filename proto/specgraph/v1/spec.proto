syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

import "google/protobuf/timestamp.proto";
import "specgraph/v1/authoring.proto";

// --- Enums ---

enum SpecLifecycle {
  SPEC_LIFECYCLE_UNSPECIFIED = 0;
  SPEC_LIFECYCLE_TASK = 1;
  SPEC_LIFECYCLE_LIVING = 2;
}

// --- Messages ---

message Spec {
  string id = 1;           // stable ULID, e.g. "spec-01JQXYZ..."
  string slug = 2;         // human-readable, e.g. "oauth-refresh-rotation"
  string intent = 3;       // what this spec is about
  string stage = 4;        // spark | shape | specify | decompose | approved | in_progress | done
  string priority = 5;     // p0 | p1 | p2 | p3
  string complexity = 6;   // low | medium | high
  int32 version = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  SpecLifecycle lifecycle = 10; // task (default) | living
  string superseded_by = 11;   // slug of replacement spec, if superseded
  string supersedes = 12;      // slug of spec this replaced
  reserved 13;
  reserved "history";
  string notes = 14;  // free-text notes (conversation summaries, context)
  string content_hash = 15; // Murmur3-128 hex digest of substantive fields; changes on every mutation
  repeated specgraph.v1.ConversationLog conversation_logs = 16; // authoring conversation audit trail
  specgraph.v1.SparkOutput spark_output = 17;         // populated when stage >= spark
  specgraph.v1.ShapeOutput shape_output = 18;         // populated when stage >= shape
  specgraph.v1.SpecifyOutput specify_output = 19;     // populated when stage >= specify
  specgraph.v1.DecomposeOutput decompose_output = 20; // populated when stage >= decompose
  int32 conversation_count = 21; // count of conversation log entries (populated by ListSpecs)
}

message FieldChange {
  string field     = 1;
  string old_value = 2;
  string new_value = 3;
}

message ChangeLogEntry {
  string id = 1;
  int32 version = 2;
  string stage = 3;
  string content_hash = 4;
  bool checkpoint = 5;
  string summary = 6;
  string reason = 7;
  repeated FieldChange changes = 8;
  google.protobuf.Timestamp date = 9;
}

message ListChangesRequest {
  string slug = 1;
  bool checkpoints_only = 2;
  int32 since_version = 3;
  int32 limit = 4;
}

message ListChangesResponse {
  repeated ChangeLogEntry entries = 1;
}

message InlineDiff {
  enum Op {
    EQUAL = 0;
    INSERT = 1;
    DELETE = 2;
  }
  Op op = 1;
  string text = 2;
}

message VersionDiff {
  string field = 1;
  string old_value = 2;
  string new_value = 3;
  repeated InlineDiff hunks = 4;
}

message CompareVersionsRequest {
  string slug = 1;
  int32 from_version = 2;
  int32 to_version = 3;
}

message CompareVersionsResponse {
  int32 from_version = 1;
  int32 to_version = 2;
  string from_stage = 3;
  string to_stage = 4;
  repeated VersionDiff diffs = 5;
}

message CreateSpecRequest {
  string slug = 1;
  string intent = 2;
  string priority = 3;     // optional, defaults to "p2"
  string complexity = 4;   // optional, defaults to "medium"
}

message GetSpecRequest {
  string slug = 1;
}

message ListSpecsRequest {
  string stage = 1;        // optional filter
  string priority = 2;     // optional filter
  int32 limit = 3;         // optional, defaults to 50
}

message ListSpecsResponse {
  repeated Spec specs = 1;
}

message UpdateSpecRequest {
  string slug = 1;              // identifies which spec to update (required)
  optional string intent = 2;
  optional string stage = 3;
  optional string priority = 4;
  optional string complexity = 5;
  optional string notes = 6;
}

message CreateSpecResponse { Spec spec = 1; }
message GetSpecResponse { Spec spec = 1; }
message UpdateSpecResponse { Spec spec = 1; }

// --- Service ---

service SpecService {
  rpc CreateSpec(CreateSpecRequest) returns (CreateSpecResponse);
  rpc GetSpec(GetSpecRequest) returns (GetSpecResponse);
  rpc ListSpecs(ListSpecsRequest) returns (ListSpecsResponse);
  rpc UpdateSpec(UpdateSpecRequest) returns (UpdateSpecResponse);
  rpc ListChanges(ListChangesRequest) returns (ListChangesResponse);
  rpc CompareVersions(CompareVersionsRequest) returns (CompareVersionsResponse);
}
