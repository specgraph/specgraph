syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

import "google/protobuf/timestamp.proto";
import "specgraph/v1/claim.proto";
import "specgraph/v1/constitution.proto";
import "specgraph/v1/decision.proto";
import "specgraph/v1/slice.proto";
import "specgraph/v1/spec.proto";

// --- Enums ---

enum ExecutionEventType {
  EXECUTION_EVENT_TYPE_UNSPECIFIED = 0;
  EXECUTION_EVENT_TYPE_PROGRESS = 1;
  EXECUTION_EVENT_TYPE_BLOCKER = 2;
  EXECUTION_EVENT_TYPE_COMPLETION = 3;
}

// --- Messages ---

message CallbackConfig {
  string endpoint = 1;
  string prime = 2;
  string progress = 3;
  string blocker = 4;
  string completion = 5;
}

message Bundle {
  int32 version = 1;
  Spec spec = 2;
  repeated Decision decisions = 3;
  string bootstrap = 4;
  CallbackConfig callbacks = 5;
  reserved 6;
  reserved "bundle_yaml";
  string bundle_content = 7;
}

message GraphOverview {
  map<string, int32> counts_by_stage = 1;
}

message ProjectView {
  Constitution constitution = 1;
  repeated ProvenanceEntry constitution_provenance = 2;
  GraphOverview graph_overview = 3;
  repeated Spec ready = 4;
  // findings_by_severity is keyed by FindingSeverity enum value (int32).
  map<int32, int32> findings_by_severity = 5;
  int32 skills_count = 6;
}

message SpecView {
  Spec spec = 1;
  Constitution constitution = 2;
  repeated ProvenanceEntry constitution_provenance = 3;
  repeated Decision decisions = 4;
  repeated Slice slices = 5;
  repeated Claim claims = 6;
  // Blockers are surfaced as ExecutionEvents filtered to
  // EXECUTION_EVENT_TYPE_BLOCKER. There is no separate Blocker entity.
  repeated ExecutionEvent blockers = 7;
}

message PrimeResponse {
  // Legacy summary fields (1-5) preserved for backward compatibility with
  // older polecats. New clients should read the `view` oneof.
  string constitution_summary = 1;
  string project_context = 2;
  repeated Decision decisions = 3;
  string coding_conventions = 4;
  string callback_docs = 5;

  oneof view {
    ProjectView project_view = 10;
    SpecView spec_view = 11;
  }
}

message ExecutionEvent {
  string id = 1;
  string spec_slug = 2;
  string agent = 3;
  ExecutionEventType type = 4;
  string message = 5;
  google.protobuf.Timestamp created_at = 6;
}

// --- Requests/Responses ---

message GenerateBundleRequest {
  string slug = 1;
  string endpoint = 2;
}

message GenerateBundleResponse { Bundle bundle = 1; }

message GetPrimeRequest {
  // slug identifies a spec to prime against. When empty, the handler returns
  // a project-level view (PrimeResponse.project_view) rather than a
  // spec-level view (PrimeResponse.spec_view).
  string slug = 1;
}

message ReportProgressRequest {
  string slug = 1;
  string agent = 2;
  string message = 3;
}

message ReportProgressResponse {
  bool acknowledged = 1;
}

message ReportBlockerRequest {
  string slug = 1;
  string agent = 2;
  string description = 3;
}

message ReportBlockerResponse {
  bool acknowledged = 1;
}

message ReportCompletionRequest {
  string slug = 1;
  string agent = 2;
}

message ReportCompletionResponse {
  bool acknowledged = 1;
  string new_stage = 2;
}

message GetExecutionEventsRequest {
  string slug = 1;
  uint32 limit = 2;
}

message GetExecutionEventsResponse {
  repeated ExecutionEvent events = 1;
}

// --- Service ---

service ExecutionService {
  rpc GenerateBundle(GenerateBundleRequest) returns (GenerateBundleResponse);
  rpc GetPrime(GetPrimeRequest) returns (PrimeResponse);
  rpc ReportProgress(ReportProgressRequest) returns (ReportProgressResponse);
  rpc ReportBlocker(ReportBlockerRequest) returns (ReportBlockerResponse);
  rpc ReportCompletion(ReportCompletionRequest) returns (ReportCompletionResponse);
  rpc GetExecutionEvents(GetExecutionEventsRequest) returns (GetExecutionEventsResponse);
}
