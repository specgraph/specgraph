syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

import "google/protobuf/timestamp.proto";

// IdentityService manages users, service accounts, API keys, and OIDC
// bindings. It is a GLOBAL service (not project-scoped). Most management RPCs
// require the admin role (enforced by Cedar via the "manage" verb), including
// ResyncUserRole (user.manage). Two categories are NOT admin-only: Whoami is
// self-scoped and available to any authenticated principal; and the four
// *MyAPIKey RPCs (CreateMyAPIKey/ListMyAPIKeys/RotateMyAPIKey/RevokeMyAPIKey)
// are SELF-scoped — any authenticated principal may call them for their own
// keys, gated by the Cedar "apikey.self" verb and further restricted in the
// handler (owner derived from context, never client-supplied).
service IdentityService {
  rpc Whoami(WhoamiRequest) returns (WhoamiResponse);

  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc CreateServiceAccount(CreateServiceAccountRequest) returns (CreateServiceAccountResponse);
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (UpdateUserRoleResponse);
  rpc ResyncUserRole(ResyncUserRoleRequest) returns (ResyncUserRoleResponse);
  rpc SoftDeleteUser(SoftDeleteUserRequest) returns (SoftDeleteUserResponse);
  rpc PurgeUser(PurgeUserRequest) returns (PurgeUserResponse);

  rpc CreateAPIKey(CreateAPIKeyRequest) returns (CreateAPIKeyResponse);
  rpc RevokeAPIKey(RevokeAPIKeyRequest) returns (RevokeAPIKeyResponse);
  rpc RotateAPIKey(RotateAPIKeyRequest) returns (RotateAPIKeyResponse);
  rpc ListAPIKeys(ListAPIKeysRequest) returns (ListAPIKeysResponse);

  // Self-scoped API-key RPCs (AUTH-03): owner is derived from context; the
  // request messages carry NO user_id/target field by design.
  rpc CreateMyAPIKey(CreateMyAPIKeyRequest) returns (CreateMyAPIKeyResponse);
  rpc ListMyAPIKeys(ListMyAPIKeysRequest) returns (ListMyAPIKeysResponse);
  rpc RotateMyAPIKey(RotateMyAPIKeyRequest) returns (RotateMyAPIKeyResponse);
  rpc RevokeMyAPIKey(RevokeMyAPIKeyRequest) returns (RevokeMyAPIKeyResponse);

  rpc ListOIDCBindings(ListOIDCBindingsRequest) returns (ListOIDCBindingsResponse);
  rpc UnbindOIDC(UnbindOIDCRequest) returns (UnbindOIDCResponse);
}

enum UserKind {
  USER_KIND_UNSPECIFIED = 0;
  USER_KIND_HUMAN = 1;
  USER_KIND_SERVICE_ACCOUNT = 2;
}

// User mirrors storage.User. deleted_at is unset for active users.
message User {
  string id = 1;
  UserKind kind = 2;
  string display_name = 3;
  string email = 4;
  string role = 5;
  string owner_user_id = 6;
  bool bootstrap = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp deleted_at = 9;
}

// APIKey mirrors storage.APIKey MINUS the secret material. The PHC hash is
// never serialized; the plaintext token appears only in Create/Rotate
// responses, never here.
message APIKey {
  string id = 1;
  string user_id = 2;
  string prefix = 3;
  string role_downgrade = 4;
  string label = 5;
  google.protobuf.Timestamp expires_at = 6;
  google.protobuf.Timestamp last_used_at = 7;
  google.protobuf.Timestamp revoked_at = 8;
  google.protobuf.Timestamp created_at = 9;
}

message OIDCBinding {
  string id = 1;
  string user_id = 2;
  string issuer = 3;
  string subject = 4;
  string email_at_bind = 5;
  google.protobuf.Timestamp created_at = 6;
}

message WhoamiRequest {}
message WhoamiResponse {
  string subject = 1;
  string user_id = 2;
  string display_name = 3;
  string role = 4;
  string effective_role = 5;
  string email = 6;
  string source = 7;
}

message ListUsersRequest {
  UserKind kind = 1;          // UNSPECIFIED = all kinds
  string role = 2;            // empty = all roles
  bool include_deleted = 3;
  int32 limit = 4;            // 0 = default
  int32 offset = 5;
}
message ListUsersResponse { repeated User users = 1; }

message GetUserRequest { string id = 1; }
message GetUserResponse { User user = 1; }

message CreateServiceAccountRequest {
  string display_name = 1;
  string role = 2;
  string owner_user_id = 3;  // must reference an active Human
}
message CreateServiceAccountResponse { User user = 1; }

message UpdateUserRoleRequest {
  string id = 1;
  string role = 2;
}
message UpdateUserRoleResponse { User user = 1; }

// ResyncUserRole re-applies a user's authoritative role (AUTH-02). When
// revoke_keys is true it drives the hard off-board: the user's API keys are
// revoked as part of the role change so a downgraded/off-boarded principal
// cannot keep minting or using pre-existing keys. Admin-only (user.manage).
message ResyncUserRoleRequest {
  string id = 1;
  string role = 2;
  bool revoke_keys = 3;
}
message ResyncUserRoleResponse { User user = 1; }

message SoftDeleteUserRequest {
  string id = 1;
  bool force = 2; // required to soft-delete the bootstrap admin
}
message SoftDeleteUserResponse {}

message PurgeUserRequest {
  string id = 1;
  bool force = 2; // required to purge the bootstrap admin
}
message PurgeUserResponse {}

message CreateAPIKeyRequest {
  string user_id = 1;
  string label = 2;
  string role_downgrade = 3;            // empty = no downgrade
  google.protobuf.Timestamp expires_at = 4; // unset = no expiry
}
// plaintext is the full token (spgr_sk_<prefix>_<secret>); shown ONCE.
message CreateAPIKeyResponse {
  APIKey key = 1;
  string plaintext = 2;
}

message RevokeAPIKeyRequest { string key_id = 1; }
message RevokeAPIKeyResponse {}

// RotateAPIKey mints a new secret for an existing key and revokes the old one.
// Rotation PRESERVES the key's identity and authority: owner, role_downgrade,
// and label are inherited from the old key and cannot be changed here — that
// keeps a rotated key recognizable and prevents a rotation from silently
// relaxing an authority cap. To change a key's authority, revoke it and create
// a new key. The caller MAY set expires_at to choose the new secret's validity
// window; unset inherits the old key's expiry (never silently cleared).
message RotateAPIKeyRequest {
  string key_id = 1;
  // Fields 2-4 (user_id, label, role_downgrade) were removed: storage inherits
  // them from the old key, so accepting them invited silent no-ops and an
  // authority-downgrade footgun.
  reserved 2, 3, 4;
  reserved "user_id", "label", "role_downgrade";
  google.protobuf.Timestamp expires_at = 5; // unset = inherit old key's expiry
}
message RotateAPIKeyResponse {
  APIKey key = 1;
  string plaintext = 2;
}

message ListAPIKeysRequest {
  string user_id = 1;        // empty = all users (admin)
  bool include_revoked = 2;
  int32 limit = 3;
  int32 offset = 4;
}
message ListAPIKeysResponse { repeated APIKey keys = 1; }

// Self-service API-key messages (AUTH-03). These mirror the admin CreateAPIKey/
// Rotate/Revoke/List surface but carry NO user_id/target field: the owner is
// always derived from the authenticated context in the handler, so a caller can
// never name another owner at the wire level (T-02-01 mitigation).
message CreateMyAPIKeyRequest {
  string label = 1;
  string role_downgrade = 2;                // empty = no downgrade
  google.protobuf.Timestamp expires_at = 3; // unset = policy default expiry
}
// plaintext is the full token (spgr_sk_<prefix>_<secret>); shown ONCE.
message CreateMyAPIKeyResponse {
  APIKey key = 1;
  string plaintext = 2;
}

message ListMyAPIKeysRequest {}
message ListMyAPIKeysResponse { repeated APIKey keys = 1; }

// RotateMyAPIKey mints a new secret for one of the caller's own keys and
// revokes the old one, preserving the key's identity and authority (owner,
// role_downgrade, label are inherited). The caller MAY set expires_at to choose
// the new secret's validity window; unset inherits the old key's expiry.
message RotateMyAPIKeyRequest {
  string key_id = 1;
  google.protobuf.Timestamp expires_at = 2; // unset = inherit old key's expiry
}
message RotateMyAPIKeyResponse {
  APIKey key = 1;
  string plaintext = 2;
}

message RevokeMyAPIKeyRequest { string key_id = 1; }
message RevokeMyAPIKeyResponse {}

message ListOIDCBindingsRequest { string user_id = 1; }
message ListOIDCBindingsResponse { repeated OIDCBinding bindings = 1; }

message UnbindOIDCRequest {
  string binding_id = 1;
  string user_id = 2; // owner of the binding (required for the last-credential check)
  bool force = 3;     // required to remove a user's only credential
}
message UnbindOIDCResponse {}
