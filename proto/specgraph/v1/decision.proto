syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/seanb4t/specgraph/gen/specgraph/v1;specgraphv1";

import "google/protobuf/timestamp.proto";

// --- Enums ---

enum DecisionStatus {
  DECISION_STATUS_UNSPECIFIED = 0;
  DECISION_STATUS_PROPOSED = 1;
  DECISION_STATUS_ACCEPTED = 2;
  DECISION_STATUS_DEPRECATED = 3;
  DECISION_STATUS_SUPERSEDED = 4;
}

// --- Messages ---

message Decision {
  string id = 1;                             // stable ULID, e.g. "dec-01JQXYZ..."
  string slug = 2;                           // human-readable, e.g. "use-memgraph"
  string title = 3;                          // short title
  DecisionStatus status = 4;
  string decision = 5;                       // the decision text
  string rationale = 6;                      // why this decision was made
  string superseded_by = 7;                  // slug of superseding decision, if any
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  string content_hash = 10;                  // Murmur3-128 hex digest of substantive fields; changes on every mutation
}

message CreateDecisionRequest {
  string slug = 1;
  string title = 2;
  string decision = 3;
  string rationale = 4;
}

message GetDecisionRequest {
  string slug = 1;
}

message ListDecisionsRequest {
  DecisionStatus status = 1;  // optional filter; UNSPECIFIED means no filter
  int32 limit = 2;            // optional, defaults to 50
}

message ListDecisionsResponse {
  repeated Decision decisions = 1;
}

message UpdateDecisionRequest {
  string slug = 1;                         // identifies which decision (required)
  optional string title = 2;
  optional DecisionStatus status = 3;
  optional string decision = 4;
  optional string rationale = 5;
  optional string superseded_by = 6;
}

// --- Service ---

service DecisionService {
  rpc CreateDecision(CreateDecisionRequest) returns (Decision);
  rpc GetDecision(GetDecisionRequest) returns (Decision);
  rpc ListDecisions(ListDecisionsRequest) returns (ListDecisionsResponse);
  rpc UpdateDecision(UpdateDecisionRequest) returns (Decision);
}
