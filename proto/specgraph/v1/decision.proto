syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

import "google/protobuf/timestamp.proto";

// --- Enums ---

enum DecisionStatus {
  DECISION_STATUS_UNSPECIFIED = 0;
  DECISION_STATUS_PROPOSED = 1;
  DECISION_STATUS_ACCEPTED = 2;
  DECISION_STATUS_DEPRECATED = 3;
  DECISION_STATUS_SUPERSEDED = 4;
}

enum DecisionConfidence {
  DECISION_CONFIDENCE_UNSPECIFIED = 0;
  DECISION_CONFIDENCE_HIGH = 1;
  DECISION_CONFIDENCE_MEDIUM = 2;
  DECISION_CONFIDENCE_LOW = 3;
}

enum DecisionScope {
  DECISION_SCOPE_UNSPECIFIED = 0;
  DECISION_SCOPE_PROJECT = 1;
  DECISION_SCOPE_TEAM = 2;
  DECISION_SCOPE_ORG = 3;
}

message RejectedAlternative {
  string option = 1;
  string reason = 2;
}

// --- Messages ---

message Decision {
  string id = 1;                             // stable ULID, e.g. "dec-01JQXYZ..."
  string slug = 2;                           // human-readable, e.g. "use-memgraph"
  string title = 3;                          // short title
  DecisionStatus status = 4;
  string decision = 5;                       // the decision text
  string rationale = 6;                      // why this decision was made
  string superseded_by = 7;                  // slug of superseding decision, if any
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  string content_hash = 10;                  // Murmur3-128 hex digest of substantive fields; changes on every mutation
  string question = 11;                      // the question this decision answers
  repeated RejectedAlternative rejected_alternatives = 12;
  DecisionConfidence confidence = 13;
  repeated string tags = 14;
  DecisionScope scope = 15;
  string origin_spec = 16;                   // slug of the spec that prompted this decision
  string origin_stage = 17;                  // authoring stage when decision was created
  int32 version = 18;                        // optimistic concurrency version
}

message CreateDecisionRequest {
  string slug = 1;
  string title = 2;
  string decision = 3;
  string rationale = 4;
  string question = 5;
  repeated RejectedAlternative rejected_alternatives = 6;
  DecisionConfidence confidence = 7;
  repeated string tags = 8;
  DecisionScope scope = 9;
  string origin_spec = 10;
  string origin_stage = 11;
}

message GetDecisionRequest {
  string slug = 1;
}

message ListDecisionsRequest {
  DecisionStatus status = 1;  // optional filter; UNSPECIFIED means no filter
  int32 limit = 2;            // optional, defaults to 50
}

message ListDecisionsResponse {
  repeated Decision decisions = 1;
}

message UpdateDecisionRequest {
  string slug = 1;                         // identifies which decision (required)
  optional string title = 2;
  optional DecisionStatus status = 3;
  optional string decision = 4;
  optional string rationale = 5;
  optional string superseded_by = 6;
  optional string question = 7;
  optional DecisionConfidence confidence = 8;
  repeated string tags = 9;
  optional DecisionScope scope = 10;
  optional string origin_spec = 11;
  optional string origin_stage = 12;
  repeated RejectedAlternative rejected_alternatives = 13;
  int32 expected_version = 14;                       // optimistic concurrency: 0 = skip check
}

message CreateDecisionResponse { Decision decision = 1; }
message GetDecisionResponse { Decision decision = 1; }
message UpdateDecisionResponse { Decision decision = 1; }

// --- Service ---

service DecisionService {
  rpc CreateDecision(CreateDecisionRequest) returns (CreateDecisionResponse);
  rpc GetDecision(GetDecisionRequest) returns (GetDecisionResponse);
  rpc ListDecisions(ListDecisionsRequest) returns (ListDecisionsResponse);
  rpc UpdateDecision(UpdateDecisionRequest) returns (UpdateDecisionResponse);
}
