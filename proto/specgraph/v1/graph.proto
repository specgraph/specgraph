syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

// --- Edge Types ---

enum EdgeType {
  EDGE_TYPE_UNSPECIFIED = 0;
  EDGE_TYPE_DEPENDS_ON = 1;    // A depends on B (A cannot start until B is done)
  EDGE_TYPE_BLOCKS = 2;        // A blocks B (inverse of depends_on, stored as DEPENDS_ON from B→A)
  EDGE_TYPE_COMPOSES = 3;      // A composes B (B is a child/sub-spec of A)
  EDGE_TYPE_RELATES_TO = 4;    // A relates to B (informational link)
  EDGE_TYPE_INFORMS = 5;       // Decision A informs Spec B
  EDGE_TYPE_DECIDED_IN = 6;   // Decision A was decided in context of Spec B
  EDGE_TYPE_SUPERSEDES = 7;   // A supersedes B (A is the replacement for B)
}

// --- Messages ---

message Edge {
  string from_id = 1;
  string to_id = 2;
  EdgeType edge_type = 3;
}

message AddEdgeRequest {
  string from_slug = 1;
  string to_slug = 2;
  EdgeType edge_type = 3;
}

message AddEdgeResponse { Edge edge = 1; }

message RemoveEdgeRequest {
  string from_slug = 1;
  string to_slug = 2;
  EdgeType edge_type = 3;
}

message RemoveEdgeResponse {}

message ListEdgesRequest {
  string slug = 1;             // list edges for this node
  EdgeType edge_type = 2;      // optional filter
}

message ListEdgesResponse {
  repeated Edge edges = 1;
}

message NodeRef {
  string id = 1;
  string slug = 2;
  string label = 3;           // "Spec" or "Decision"
  string stage = 4;           // stage/status of the node
}

message GetDependenciesRequest {
  string slug = 1;
}

message GetDependenciesResponse {
  repeated NodeRef dependencies = 1;
}

message GetTransitiveDepsRequest {
  string slug = 1;
}

message GetTransitiveDepsResponse {
  repeated NodeRef dependencies = 1;
}

message GetImpactRequest {
  string slug = 1;
}

message GetImpactResponse {
  repeated NodeRef impacted = 1;
}

message GetReadyRequest {}

message GetReadyResponse {
  repeated NodeRef ready = 1;
}

message GetCriticalPathRequest {
  string slug = 1;
}

message GetCriticalPathResponse {
  repeated NodeRef path = 1;
}

message GetFullGraphRequest {}

message GraphNode {
  string slug = 1;
  string label = 2;      // "Spec" or "Decision"
  string stage = 3;       // authoring stage or decision status
  string intent = 4;      // spec intent or decision title
  string priority = 5;    // p0-p3 (specs only, empty for decisions)
}

message GetFullGraphResponse {
  repeated GraphNode nodes = 1;
  repeated Edge edges = 2;
}

// --- Service ---

service GraphService {
  rpc AddEdge(AddEdgeRequest) returns (AddEdgeResponse);
  rpc RemoveEdge(RemoveEdgeRequest) returns (RemoveEdgeResponse);
  rpc ListEdges(ListEdgesRequest) returns (ListEdgesResponse);
  rpc GetDependencies(GetDependenciesRequest) returns (GetDependenciesResponse);
  rpc GetTransitiveDeps(GetTransitiveDepsRequest) returns (GetTransitiveDepsResponse);
  rpc GetImpact(GetImpactRequest) returns (GetImpactResponse);
  rpc GetReady(GetReadyRequest) returns (GetReadyResponse);
  rpc GetCriticalPath(GetCriticalPathRequest) returns (GetCriticalPathResponse);
  rpc GetFullGraph(GetFullGraphRequest) returns (GetFullGraphResponse);
}
