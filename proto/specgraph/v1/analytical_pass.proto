syntax = "proto3";
package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

import "specgraph/v1/authoring.proto";

// PassType identifies which analytical pass produced or should process findings.
enum PassType {
  PASS_TYPE_UNSPECIFIED = 0;
  PASS_TYPE_CONSTITUTION_CHECK = 1;
  PASS_TYPE_RED_TEAM = 2;
  PASS_TYPE_PERIPHERAL_VISION = 3;
  PASS_TYPE_CONSISTENCY = 4;
  PASS_TYPE_SIMPLICITY = 5;
  // PASS_TYPE_APPROVE_REJECTED is emitted by the Approve handler when action is
  // APPROVE_ACTION_REJECT. It records the rejection rationale as a critical finding.
  PASS_TYPE_APPROVE_REJECTED = 6;
}

// AnalyticalPassService manages LLM-driven analytical passes for spec evaluation.
service AnalyticalPassService {
  rpc RunAnalyticalPass(RunAnalyticalPassRequest) returns (RunAnalyticalPassResponse);
  rpc StoreFindings(StoreFindingsRequest) returns (StoreFindingsResponse);
  rpc ListFindings(ListFindingsRequest) returns (ListFindingsResponse);
  rpc ListProjectFindings(ListProjectFindingsRequest) returns (ListProjectFindingsResponse);
}

message RunAnalyticalPassRequest {
  string slug = 1;
  PassType pass_type = 2;
}

message RunAnalyticalPassResponse {
  PassType pass_type = 1;
  string prompt_template = 2;
  repeated ToolReference tools = 3;
  string initial_message = 4;
  repeated string offered_passes = 5;
  string stage = 6;
}

message ToolReference {
  string name = 1;
  string command = 2;
  string description = 3;
}

message AnalyticalFinding {
  string id = 1;
  PassType pass_type = 2;
  FindingSeverity severity = 3;
  string summary = 4;
  string detail = 5;
  string constraint = 6;
  string resolution = 7;
  int32 version = 8;
  string spec_slug = 9;
}

message AnalyticalFindingInput {
  FindingSeverity severity = 1;
  string summary = 2;
  string detail = 3;
  string constraint = 4;
  string resolution = 5;
}

message StoreFindingsRequest {
  string slug = 1;
  PassType pass_type = 2;
  repeated AnalyticalFindingInput findings = 3;
}

message StoreFindingsResponse {
  repeated string ids = 1;
}

message ListFindingsRequest {
  string slug = 1;
  PassType pass_type = 2;
}

message ListFindingsResponse {
  repeated AnalyticalFinding findings = 1;
}

message ListProjectFindingsRequest {
  PassType pass_type = 1;
}

message ListProjectFindingsResponse {
  repeated AnalyticalFinding findings = 1;
}
