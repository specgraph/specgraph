syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

import "google/protobuf/timestamp.proto";

// --- Enums ---

enum AuthoringStage {
  // Default value; not a valid stage.
  AUTHORING_STAGE_UNSPECIFIED = 0;
  // Initial ideation stage where the spec concept is captured.
  AUTHORING_STAGE_SPARK = 1;
  // Scoping stage where approaches and boundaries are defined.
  AUTHORING_STAGE_SHAPE = 2;
  // Contract stage where interfaces and invariants are recorded.
  AUTHORING_STAGE_SPECIFY = 3;
  // Decomposition stage where the spec is broken into implementable slices.
  AUTHORING_STAGE_DECOMPOSE = 4;
  // Terminal stage indicating the spec is approved for execution.
  AUTHORING_STAGE_APPROVED = 5;
}

enum Posture {
  POSTURE_UNSPECIFIED = 0;
  // AI drives; human reviews and approves.
  POSTURE_DRIVE = 1;
  // AI and human collaborate as equals.
  POSTURE_PARTNER = 2;
  // Human drives; AI responds on request.
  POSTURE_SUPPORT = 3;
}

enum FindingSeverity {
  FINDING_SEVERITY_UNSPECIFIED = 0;
  // Must be resolved before the spec can advance.
  FINDING_SEVERITY_CRITICAL = 1;
  // Should be addressed but does not block advancement.
  FINDING_SEVERITY_WARNING = 2;
  // Informational; no action required.
  FINDING_SEVERITY_NOTE = 3;
}

enum DecompositionStrategy {
  DECOMPOSITION_STRATEGY_UNSPECIFIED = 0;
  // Deliver end-to-end value in independently shippable vertical slices.
  DECOMPOSITION_STRATEGY_VERTICAL_SLICE = 1;
  // Split work by architectural layer (e.g. storage first, then API, then UI).
  DECOMPOSITION_STRATEGY_LAYER_CAKE = 2;
  // Deliver the entire spec as one unit; no decomposition.
  DECOMPOSITION_STRATEGY_SINGLE_UNIT = 3;
}

enum SafetyCategory {
  SAFETY_CATEGORY_UNSPECIFIED = 0;
  // Flags patterns related to authentication, authorization, or credential handling.
  SAFETY_CATEGORY_SECURITY = 1;
  // Flags patterns related to irreversible data destruction or loss.
  SAFETY_CATEGORY_DATA_LOSS = 2;
}

enum ScopeSniff {
  SCOPE_SNIFF_UNSPECIFIED = 0;
  // Estimated effort: hours to a day.
  SCOPE_SNIFF_TINY = 1;
  // Estimated effort: a few days.
  SCOPE_SNIFF_SMALL = 2;
  // Estimated effort: one to two weeks.
  SCOPE_SNIFF_MEDIUM = 3;
  // Estimated effort: several weeks.
  SCOPE_SNIFF_LARGE = 4;
  // Estimated effort: months; may need decomposition.
  SCOPE_SNIFF_EPIC = 5;
}

// --- Stage Output Messages ---

// SparkOutput captures the initial distillation of a raw idea into a structured seed.
message SparkOutput {
  // Raw idea or problem statement provided by the author.
  string seed = 1;
  // Why this idea matters now — the motivating signal.
  string signal = 2;
  // Clarifying questions to sharpen scope before shaping.
  repeated string questions = 3;
  // Early indication of whether the idea is small, medium, or large in scope.
  ScopeSniff scope_sniff = 4;
  // Condition that would make this idea not worth pursuing.
  string kill_test = 5;
}

// DecisionInput captures a design decision made during shaping.
message DecisionInput {
  string slug = 1;
  string title = 2;
  string decision = 3;
  string rationale = 4;
}

// ShapeOutput captures scope boundaries, approaches, and success criteria for a spec.
message ShapeOutput {
  // Capabilities or behaviours explicitly included in this spec.
  repeated string scope_in = 1;
  // Capabilities or behaviours explicitly excluded from this spec.
  repeated string scope_out = 2;
  // Candidate implementation approaches considered during shaping.
  repeated Approach approaches = 3;
  // Identifier of the approach selected for implementation.
  string chosen_approach = 4;
  // Known risks that could affect delivery or outcomes.
  repeated string risks = 5;
  // Outcomes that must be achieved for the spec to be considered successful.
  repeated string success_must = 6;
  // Outcomes that should be achieved but are not strictly required.
  repeated string success_should = 7;
  // Outcomes explicitly deferred or out of scope for this spec.
  repeated string success_wont = 8;
  // Design decisions made during shaping that should be recorded as ADRs.
  // WIRE-BREAK NOTE: field 9 was previously `repeated string decisions`.
  // It was changed to `repeated DecisionInput decisions` — a wire-incompatible
  // type change at the same field number. This is intentional: there were no
  // deployed consumers at the time of the change. Future incompatible changes
  // MUST use a new field number rather than reusing an existing one.
  repeated DecisionInput decisions = 9;
}

// Approach describes one candidate implementation strategy for a spec.
message Approach {
  // Short human-readable label for this approach.
  string name = 1;
  // Explanation of how this approach would work.
  string description = 2;
  // Trade-offs (pros and cons) relative to other approaches.
  repeated string tradeoffs = 3;
}

// InterfaceSection defines one API surface in the specify stage contract.
message InterfaceSection {
  // Surface name, e.g. "WebhookService proto", "EventBus Go interface".
  string name = 1;
  // Free-form contract content (proto definitions, method signatures, etc.).
  string body = 2;
}

// VerifyCriterion defines one testable acceptance criterion with a category.
message VerifyCriterion {
  // Category grouping, e.g. "emission", "CRUD", "e2e".
  string category = 1;
  // The criterion description.
  string description = 2;
}

// FileTouch identifies a file expected to be created or modified by this spec.
message FileTouch {
  // File or package path relative to repo root.
  string path = 1;
  // What changes and why.
  string purpose = 2;
  // Type of change: "new", "modify", "delete".
  string change_type = 3;
}

// SpecifyOutput captures the precise contract and verification criteria for a spec.
// WIRE-BREAK: Fields 1, 2, 4 change type from string/repeated-string to
// repeated-message. Intentional at 0.2.0-dev (no production data). Field
// numbers reused because semantic intent is preserved.
message SpecifyOutput {
  // Interface contracts, one per API surface.
  repeated InterfaceSection interfaces = 1;
  // Categorized conditions that must hold for correctness.
  repeated VerifyCriterion verify_criteria = 2;
  // Invariants that must never be violated across any implementation state.
  repeated string invariants = 3;
  // Files, packages, or components expected to be created or modified.
  repeated FileTouch touches = 4;
}

// DecomposeOutput captures the decomposition strategy and resulting slices for a spec.
message DecomposeOutput {
  // Strategy used to break the spec into independently deliverable slices.
  DecompositionStrategy strategy = 1;
  // Input: slice definitions from the decompose request.
  repeated DecompositionSlice slices = 2;
  // Output: resolved slugs of created Slice graph nodes (populated after storage).
  repeated string slice_slugs = 3;
}

// DecompositionSlice represents one independently deliverable unit of work within a spec.
message DecompositionSlice {
  // Unique identifier for this slice within the parent spec. Must be non-empty.
  string id = 1;
  // What this slice accomplishes and why it exists.
  string intent = 2;
  // Conditions that must hold for this slice to be considered complete.
  repeated string verify = 3;
  // Files, packages, or components this slice is expected to modify.
  repeated string touches = 4;
  // Slice IDs within this spec that must be complete before this slice starts.
  repeated string depends_on = 5;
}

// --- Safety Net ---

// SafetyFlag marks a concern that may indicate harmful, risky, or out-of-policy content.
message SafetyFlag {
  // Category of safety concern.
  SafetyCategory category = 1;
  // How severe the concern is and whether it requires immediate action.
  FindingSeverity severity = 2;
  // Human-readable description of the specific concern.
  string description = 3;
}

// --- Prompt Templates ---

// PromptTemplate holds a reusable LLM prompt associated with a specific authoring stage.
message PromptTemplate {
  // Authoring stage this template is intended for.
  AuthoringStage stage = 1;
  // Short identifier for this template within the stage.
  string name = 2;
  // Full prompt text, optionally containing interpolation placeholders.
  string template = 3;
}

// --- Requests / Responses ---

// SparkRequest submits author-provided spark output for validation and enrichment.
// The server creates a new Spec node with default priority "p2" and complexity
// "medium". To override these, use the GraphService UpdateSpec RPC after creation.
message SparkRequest {
  // Spec slug that uniquely identifies the spec being authored.
  string slug = 1;
  // Author-provided spark stage output to validate. Required by the server;
  // omitting this field returns INVALID_ARGUMENT.
  SparkOutput output = 2;
  // AI collaboration posture requested for this authoring session.
  Posture posture = 3;
}

// SparkResponse returns the validated spark output along with analytical findings.
message SparkResponse {
  // Validated (and potentially enriched) spark stage output.
  SparkOutput output = 1;
  // Safety concerns identified during the spark pass.
  repeated SafetyFlag safety_flags = 2;
  reserved 3;
  reserved "constitution_violations";
  // Prompt templates suggested for the next authoring stage.
  repeated PromptTemplate next_prompts = 4;
}

// ShapeRequest submits author-provided shape output for validation and enrichment.
message ShapeRequest {
  // Spec slug that uniquely identifies the spec being authored.
  string slug = 1;
  // Author-provided shape stage output to validate.
  ShapeOutput output = 2;
  // AI collaboration posture requested for this authoring session.
  Posture posture = 3;
}

// ShapeResponse returns the validated shape output along with analytical findings.
message ShapeResponse {
  // Validated (and potentially enriched) shape stage output.
  ShapeOutput output = 1;
  reserved 2, 4;
  reserved "peripheral_vision", "constitution_violations";
  // Safety concerns identified during the shape pass.
  repeated SafetyFlag safety_flags = 3;
  // Prompt templates suggested for the next authoring stage.
  repeated PromptTemplate next_prompts = 5;
}

// SpecifyRequest submits author-provided specify output for validation and enrichment.
message SpecifyRequest {
  // Spec slug that uniquely identifies the spec being authored.
  string slug = 1;
  // Author-provided specify stage output to validate.
  SpecifyOutput output = 2;
  // AI collaboration posture requested for this authoring session.
  Posture posture = 3;
}

// SpecifyResponse returns the validated specify output along with analytical findings.
message SpecifyResponse {
  // Validated (and potentially enriched) specify stage output.
  SpecifyOutput output = 1;
  reserved 2, 3, 5;
  reserved "red_team", "consistency_issues", "constitution_violations";
  // Safety concerns identified during the specify pass.
  repeated SafetyFlag safety_flags = 4;
  // Prompt templates suggested for the next authoring stage.
  repeated PromptTemplate next_prompts = 6;
}

// DecomposeRequest submits author-provided decompose output for validation and enrichment.
message DecomposeRequest {
  // Spec slug that uniquely identifies the spec being authored.
  string slug = 1;
  // Author-provided decompose stage output to validate.
  DecomposeOutput output = 2;
  // AI collaboration posture requested for this authoring session.
  Posture posture = 3;
}

// DecomposeResponse returns the validated decompose output along with analytical findings.
message DecomposeResponse {
  // Validated (and potentially enriched) decompose stage output.
  DecomposeOutput output = 1;
  reserved 2, 4;
  reserved "simplicity", "constitution_violations";
  // Safety concerns identified during the decompose pass.
  repeated SafetyFlag safety_flags = 3;
  // Prompt templates suggested for the next authoring stage.
  repeated PromptTemplate next_prompts = 5;
  reserved 6;
  reserved "child_spec_slugs";
  // Canonical slugs of the Slice nodes created during decomposition.
  repeated string slice_slugs = 7;
}

// ApproveRequest finalises a spec and advances it to the approved stage.
message ApproveRequest {
  // Spec slug identifying the spec to approve.
  string slug = 1;
}

// ApproveResponse confirms the approval and records when it occurred.
message ApproveResponse {
  // Spec slug of the approved spec.
  string slug = 1;
  // Authoring stage the spec now occupies (always APPROVED on success).
  AuthoringStage stage = 2;
  // Timestamp at which the spec was approved.
  google.protobuf.Timestamp approved_at = 3;
}

// AmendRequest rolls a non-approved spec back to an earlier stage for rework.
// Approved specs cannot be amended; use Supersede to replace them instead.
message AmendRequest {
  // Spec slug identifying the spec to amend.
  string slug = 1;
  // Human-readable explanation of why the spec is being amended.
  string reason = 2;
  // Stage the spec should be returned to for rework.
  AuthoringStage target_stage = 3;
}

// AmendResponse confirms the amendment and reports the spec's new state.
message AmendResponse {
  // Spec slug of the amended spec.
  string slug = 1;
  // Authoring stage the spec now occupies after amendment.
  AuthoringStage stage = 2;
  // Monotonically increasing amendment count for this spec.
  int32 version = 3;
}

// SupersedeRequest marks a spec as replaced by a newer spec.
message SupersedeRequest {
  // Spec slug of the spec being superseded.
  string slug = 1;
  // Spec slug of the spec that replaces the one being superseded.
  string superseded_by = 2;
  // Human-readable explanation of why this spec is being superseded.
  string reason = 3;
}

// SupersedeResponse confirms the supersession relationship.
message SupersedeResponse {
  // Spec slug of the spec that was superseded.
  string slug = 1;
  // Spec slug of the spec that now supersedes it.
  string superseded_by = 2;
}

// GetPromptsRequest retrieves available prompt templates for a given authoring stage.
// The APPROVED stage has no prompts; requesting it returns INVALID_ARGUMENT.
message GetPromptsRequest {
  // Authoring stage to retrieve prompts for.
  AuthoringStage stage = 1;
}

// GetPromptsResponse returns all prompt templates available for the requested stage.
message GetPromptsResponse {
  // Prompt templates available for the requested stage.
  repeated PromptTemplate prompts = 1;
}

// --- Service ---

service AuthoringService {
  // Spark creates a new spec and enters the spark stage.
  rpc Spark(SparkRequest) returns (SparkResponse);
  // Shape transitions from spark to shape, recording scope and approaches.
  rpc Shape(ShapeRequest) returns (ShapeResponse);
  // Specify transitions from shape to specify, recording contracts and invariants.
  rpc Specify(SpecifyRequest) returns (SpecifyResponse);
  // Decompose transitions from specify to decompose, breaking the spec into slices.
  rpc Decompose(DecomposeRequest) returns (DecomposeResponse);
  // Approve transitions from decompose to approved.
  rpc Approve(ApproveRequest) returns (ApproveResponse);
  // Amend rolls a spec back to an earlier stage.
  rpc Amend(AmendRequest) returns (AmendResponse);
  // Supersede marks a spec as replaced by another.
  rpc Supersede(SupersedeRequest) returns (SupersedeResponse);
  // GetPrompts returns prompt templates for a given authoring stage.
  rpc GetPrompts(GetPromptsRequest) returns (GetPromptsResponse);
  // RecordConversation stores authoring conversation exchanges for a spec stage.
  rpc RecordConversation(RecordConversationRequest) returns (RecordConversationResponse);
  // ListConversations returns conversation logs for a spec, in narrative order.
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
}

// --- Conversation Log ---

// ConversationExchange represents a single probe/response pair from an authoring session.
message ConversationExchange {
  string role = 1;           // "probe" or "response"
  string content = 2;        // the text of the exchange
  string stage = 3;          // authoring stage (spark, shape, specify, decompose, approve)
  int32 sequence = 4;        // pairs probes with their responses (same sequence = same pair)
  bool decision_point = 5;   // true if user made a judgment call between alternatives
}

// ConversationLog captures the authoring conversation for a single stage completion.
message ConversationLog {
  string id = 1;                              // cvl-prefixed ULID
  string stage = 2;                           // authoring stage
  int32 version = 3;                          // spec version at capture time
  bool is_amend = 4;                          // true if this was an amend re-entry
  repeated ConversationExchange exchanges = 5;
  int32 exchange_count = 6;                   // number of exchanges
  google.protobuf.Timestamp date = 7;         // creation timestamp
}

message RecordConversationRequest {
  string slug = 1;                            // spec slug
  string stage = 2;                           // authoring stage
  repeated ConversationExchange exchanges = 3;
  bool is_amend = 4;
}

message RecordConversationResponse {
  ConversationLog conversation_log = 1;
}

message ListConversationsRequest {
  string slug = 1;
  string stage = 2;  // optional filter; empty = all stages
}

message ListConversationsResponse {
  repeated ConversationLog conversation_logs = 1;
}
