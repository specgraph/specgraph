syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/seanb4t/specgraph/gen/specgraph/v1;specgraphv1";

import "specgraph/v1/spec.proto";

// --- Enums ---

enum DriftType {
  DRIFT_TYPE_UNSPECIFIED = 0;
  DRIFT_TYPE_INTERFACE = 1;
  DRIFT_TYPE_VERIFY = 2;
  DRIFT_TYPE_DEPENDENCY = 3;
}

enum DriftSeverity {
  DRIFT_SEVERITY_UNSPECIFIED = 0;
  DRIFT_SEVERITY_HIGH = 1;
  DRIFT_SEVERITY_MEDIUM = 2;
  DRIFT_SEVERITY_LOW = 3;
  DRIFT_SEVERITY_INFO = 4;
}

// DriftScope defines the valid scopes for drift detection checks.
enum DriftScope {
  DRIFT_SCOPE_UNSPECIFIED = 0;
  DRIFT_SCOPE_DEPS = 1;
  DRIFT_SCOPE_INTERFACES = 2;
  DRIFT_SCOPE_VERIFY = 3;
}

enum LintSeverity {
  LINT_SEVERITY_UNSPECIFIED = 0;
  LINT_SEVERITY_ERROR = 1;
  LINT_SEVERITY_WARNING = 2;
  LINT_SEVERITY_INFO = 3;
}

// --- Drift Messages ---

message DriftItem {
  // Category of drift detected (dependency, interface, or verify).
  DriftType type = 1;
  // Impact level of this drift item.
  DriftSeverity severity = 2;
  // Human-readable explanation of the drift.
  string description = 3;
  // Slug of the spec being checked for drift.
  string spec_slug = 4;
  // Slug of the upstream dependency that changed.
  string upstream_slug = 5;
  // Version of the upstream spec at the time the downstream was last updated.
  int32 expected_version = 6;
  // Current version of the upstream spec.
  int32 actual_version = 7;
}

message DriftReport {
  string spec_slug = 1;
  repeated DriftItem items = 2;
  bool acknowledged = 3;
  string acknowledge_note = 4;
  // True when drift items could not be refreshed (e.g. re-check failed after
  // acknowledgment). Clients should treat items as potentially stale.
  bool items_stale = 5;
}

// --- Lint Messages ---

message LintViolation {
  string rule = 1;
  LintSeverity severity = 2;
  string message = 3;
  string location = 4;
}

message LintResult {
  string spec_slug = 1;
  repeated LintViolation violations = 2;
  bool passed = 3;
}

// --- Requests/Responses ---

message TransitionAmendRequest {
  string slug = 1;
  // Required. Reason for amending the spec. Maximum 10000 characters.
  string reason = 2;
  // Valid non-terminal stages: spark, shape, specify, decompose, approved,
  // in_progress, review. Terminal states (amended, superseded, abandoned) are
  // rejected. "done" is accepted but is a no-op re-entry (spec is already done).
  // Empty means the spec enters the "amended" stage directly.
  string re_entry_stage = 3;
}

message TransitionAmendResponse {
  Spec spec = 1;
}

message TransitionSupersedeRequest {
  string slug = 1;
  string new_slug = 2;
}

message TransitionSupersedeResponse {
  Spec old_spec = 1;
  Spec new_spec = 2;
}

message TransitionAbandonRequest {
  string slug = 1;
  string reason = 2;
}

message TransitionAbandonResponse {
  Spec spec = 1;
}

message DriftCheckRequest {
  // Empty slug checks all eligible (done/amended) specs.
  string slug = 1;
  // Scope of drift detection. UNSPECIFIED checks all scopes.
  // Note: INTERFACES and VERIFY are not yet implemented and return empty results.
  DriftScope scope = 2;
}

message DriftCheckResponse {
  repeated DriftReport reports = 1;
}

message DriftAcknowledgeRequest {
  string slug = 1;
  // Required. Acknowledgment note explaining why drift is accepted.
  string note = 2;
}

message LintRequest {
  string slug = 1;
}

message LintResponse {
  repeated LintResult results = 1;
}

// --- Service ---

service LifecycleService {
  rpc TransitionAmend(TransitionAmendRequest) returns (TransitionAmendResponse);
  rpc TransitionSupersede(TransitionSupersedeRequest) returns (TransitionSupersedeResponse);
  rpc TransitionAbandon(TransitionAbandonRequest) returns (TransitionAbandonResponse);
  rpc CheckDrift(DriftCheckRequest) returns (DriftCheckResponse);
  rpc AcknowledgeDrift(DriftAcknowledgeRequest) returns (DriftReport);
  rpc Lint(LintRequest) returns (LintResponse);
}
