syntax = "proto3";

package specgraph.v1;

option go_package = "github.com/specgraph/specgraph/gen/specgraph/v1;specgraphv1";

import "google/protobuf/timestamp.proto";

// --- Enums ---

enum SyncAdapter {
  SYNC_ADAPTER_UNSPECIFIED = 0;
  SYNC_ADAPTER_BEADS = 1;
  SYNC_ADAPTER_GITHUB = 2;
}

enum SyncState {
  SYNC_STATE_UNSPECIFIED = 0;
  SYNC_STATE_PENDING = 1;
  SYNC_STATE_SYNCED = 2;
  SYNC_STATE_CONFLICT = 3;
  SYNC_STATE_ERROR = 4;
}

// Removed in spgr-yyjf: enum InjectTool. Reusing the name later is harmless on
// the wire; this comment is a historical pointer only.

// --- Messages ---

message SyncMapping {
  string spec_id = 1;
  string spec_slug = 2;
  SyncAdapter adapter = 3;
  string external_id = 4;
  SyncState state = 5;
  string error_message = 6;
  google.protobuf.Timestamp last_sync = 7;
  google.protobuf.Timestamp created_at = 8;
}

message SyncResult {
  string spec_slug = 1;
  string external_id = 2;
  SyncState state = 3;
  string message = 4;
}

message SyncConfig {
  reserved 1;
  reserved "adapter";
  string filter_stage = 2;
  string filter_priority = 3;
  bool dry_run = 4;
}

// --- Requests/Responses ---

message SyncBeadsRequest {
  SyncConfig config = 1;
}

message SyncGitHubRequest {
  SyncConfig config = 1;
}

message SyncResponse {
  repeated SyncResult results = 1;
  int32 synced = 2;
  int32 skipped = 3;
  int32 errors = 4;
  int32 dry_run_count = 5;
}

message SyncStatusRequest {
  SyncAdapter adapter = 1;
  string spec_slug = 2;
}

message SyncStatusResponse {
  repeated SyncMapping mappings = 1;
}

// Reserved: InjectRequest and InjectResponse removed when specgraph inject
// was deprecated. See docs/plans/2026-05-06-spgr-yyjf-deprecate-inject-design.md.

// --- Service ---

// SyncService pushes specs to external systems (Beads, GitHub) and reports
// sync status. The Inject RPC was removed on 2026-05-06 (spgr-yyjf
// deprecate-inject); the same surface is now served live via the MCP
// `specgraph://spec/{slug}` resource.
service SyncService {
  rpc SyncBeads(SyncBeadsRequest) returns (SyncResponse);
  rpc SyncGitHub(SyncGitHubRequest) returns (SyncResponse);
  rpc GetSyncStatus(SyncStatusRequest) returns (SyncStatusResponse);
}
