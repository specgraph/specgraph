# Cocogitto configuration — https://docs.cocogitto.io/
#
# cog is now used ONLY for local commit-message validation via the lefthook
# commit-msg hook (`cog verify`). It NO LONGER drives releases: release-please
# owns version derivation, tagging, CHANGELOG.md, and GitHub Release creation
# (see .github/workflows/release.yml and release-please-config.json).
#
# cog 7.x note: these are top-level keys, NOT nested under a [settings] table
# (cog 7 rejects an unknown `settings` section). The commit-type allow-list is
# cog's built-in default (feat, fix, docs, style, refactor, perf, test, build,
# ci, chore, revert). Do NOT re-list defaults with empty tables (`feat = {}`):
# an empty entry DISABLES that type. Only add a [commit_types] entry with a
# NON-EMPTY table to introduce a new type.

# v-prefixed tags (v1.2.3) to match GoReleaser and the existing tag history.
tag_prefix = "v"

# Tag-only releases: no in-repo CHANGELOG.md (no commit to protected main).
disable_changelog = true

# Defense-in-depth: only allow a bump from main, so a stray dispatch from a
# feature branch cannot cut a release.
branch_whitelist = ["main"]

ignore_merge_commits = true
