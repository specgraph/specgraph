version: 2
builds:
  - id: specgraph
    main: ./cmd/specgraph
    binary: specgraph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/specgraph/specgraph/cmd/specgraph.version={{.Version}}
      - -X github.com/specgraph/specgraph/cmd/specgraph.commit={{.ShortCommit}}
archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
checksum:
  name_template: checksums.txt
  algorithm: sha256
homebrew_casks:
  - name: specgraph
    repository:
      owner: specgraph
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://specgraph.io
    description: Live spec-driven development framework
    license: MIT
dockers_v2:
  - images:
      - "ghcr.io/specgraph/specgraph"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "https://github.com/specgraph/specgraph"
source:
  enabled: true
  name_template: "{{ .ProjectName }}.src"
sboms:
  - artifacts: archive
  - id: source
    artifacts: source
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true
docker_signs:
  - cmd: cosign
    output: true
    artifacts: all
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"
release:
  mode: append
changelog:
  disable: true
