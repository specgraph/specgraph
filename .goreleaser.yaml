version: 2
builds:
  - id: specgraph
    main: ./cmd/specgraph
    binary: specgraph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      # NOTE: the vars live in `package main` (cmd/specgraph/main.go), so the
      # linker symbol is `main.version` / `main.commit`. Using the full import
      # path here is silently ignored by the Go linker, leaving the binary at
      # its `0.0.0-dev+none` defaults.
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
checksum:
  name_template: checksums.txt
  algorithm: sha256
homebrew_casks:
  - name: specgraph
    repository:
      owner: specgraph
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://specgraph.io
    description: Live spec-driven development framework
    license: MIT
dockers_v2:
  - ids: [specgraph]
    images:
      - "ghcr.io/specgraph/specgraph"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "https://github.com/specgraph/specgraph"
source:
  enabled: true
  name_template: "{{ .ProjectName }}.src"
sboms:
  - artifacts: archive
  - id: source
    artifacts: source
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true
docker_signs:
  - cmd: cosign
    output: true
    artifacts: all
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"
release:
  github:
    owner: specgraph
    name: specgraph
  draft: false
  prerelease: auto
  # cog creates the v* tag LOCALLY (cog bump --disable-bump-commit) and does NOT
  # push it before GoReleaser runs. target_commitish tells the Releases API which
  # commit to create the tag from, so GoReleaser creates the remote tag as part
  # of publishing — atomically. Without this, `goreleaser release` against a
  # local-only tag fails at the API call.
  target_commitish: "{{ .Commit }}"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^build:"
      - "Merge pull request"
      - "Merge branch"
