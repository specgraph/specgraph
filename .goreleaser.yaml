version: 2
builds:
  - id: specgraph
    main: ./cmd/specgraph
    binary: specgraph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/specgraph/specgraph/cmd/specgraph.version={{.Version}}
      - -X github.com/specgraph/specgraph/cmd/specgraph.commit={{.ShortCommit}}
archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
checksum:
  name_template: checksums.txt
  algorithm: sha256
homebrew_casks:
  - name: specgraph
    repository:
      owner: specgraph
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://specgraph.io
    description: Live spec-driven development framework
    license: MIT
dockers:
  - id: docker-amd64
    ids: [specgraph]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/specgraph/specgraph:{{ .Version }}-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/specgraph/specgraph"
  - id: docker-arm64
    ids: [specgraph]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/specgraph/specgraph:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/specgraph/specgraph"
docker_manifests:
  - name_template: "ghcr.io/specgraph/specgraph:{{ .Version }}"
    image_templates:
      - "ghcr.io/specgraph/specgraph:{{ .Version }}-amd64"
      - "ghcr.io/specgraph/specgraph:{{ .Version }}-arm64"
  - name_template: "ghcr.io/specgraph/specgraph:latest"
    image_templates:
      - "ghcr.io/specgraph/specgraph:{{ .Version }}-amd64"
      - "ghcr.io/specgraph/specgraph:{{ .Version }}-arm64"
source:
  enabled: true
  name_template: "{{ .ProjectName }}.src"
sboms:
  - artifacts: archive
  - id: source
    artifacts: source
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true
docker_signs:
  - cmd: cosign
    output: true
    artifacts: all
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"
release:
  mode: append
changelog:
  disable: true
